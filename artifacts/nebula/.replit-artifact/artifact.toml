kind = "web"
previewPath = "/"
title = "Nebula Browser"
version = "1.0.0"
id = "artifacts/nebula"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18611
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nebula run dev"

[services.env]
PORT = "18611"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nebula", "run", "build"]
publicDir = "artifacts/nebula/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
